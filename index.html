<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Login Test</title></head>
<body>
<div id="login-page" style="display:flex;position:fixed;inset:0;background:#f0f0f0;align-items:center;justify-content:center;z-index:9999">
  <div style="background:white;padding:40px;border-radius:8px;width:300px">
    <h2>Login Test</h2>
    <input type="email" id="login-email" placeholder="email" style="width:100%;margin-bottom:10px;padding:8px;box-sizing:border-box"><br>
    <input type="password" id="login-password" placeholder="password" style="width:100%;margin-bottom:10px;padding:8px;box-sizing:border-box"><br>
    <button id="login-submit" onclick="doLogin()" style="width:100%;padding:10px;background:#e8560a;color:white;border:none;cursor:pointer">Sign in</button>
    <div id="login-error" style="color:red;margin-top:8px"></div>
  </div>
</div>
<div id="app" style="display:none;padding:40px">
  <h1>App loaded! Login worked.</h1>
  <p id="welcome"></p>
</div>
<script>
var SYSTEM_PASSWORD = "Geveko2026!";
var appUsers = [{email:"admin@geveko.com", name:"Admin", role:"pricing_mgr"}];
var currentUser = null;

function g(id){ return document.getElementById(id); }

function doLogin(){
  var email = (g('login-email').value||'').trim().toLowerCase();
  var password = g('login-password').value||'';
  var errEl = g('login-error');
  
  if(!email){ errEl.textContent='Enter email'; return; }
  if(password !== SYSTEM_PASSWORD){ errEl.textContent='Wrong password: '+password; return; }
  
  var user = appUsers.find(function(u){ return (u.email||'').toLowerCase() === email; });
  if(!user && email === 'admin@geveko.com'){
    user = {email:'admin@geveko.com', name:'Administrator', role:'pricing_mgr'};
  }
  if(!user){ errEl.textContent='User not found'; return; }
  
  currentUser = user;
  g('login-page').style.display = 'none';
  g('app').style.display = 'block';
  g('welcome').textContent = 'Welcome, ' + user.name + '!';
}
</script>
</body>
</html>
